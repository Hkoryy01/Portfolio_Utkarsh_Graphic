<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d35"/>
      <stop offset="100%" style="stop-color:#0d0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6aef"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Phone 1 -->
  <rect x="180" y="60" width="180" height="380" rx="24" fill="#151833" stroke="#2a2d4a" stroke-width="2"/>
  <rect x="240" y="72" width="60" height="6" rx="3" fill="#2a2d4a"/>
  <!-- Status bar -->
  <rect x="198" y="90" width="40" height="4" rx="2" fill="#5c6078" opacity="0.4"/>
  <rect x="310" y="90" width="30" height="4" rx="2" fill="#5c6078" opacity="0.4"/>
  <!-- App content -->
  <rect x="198" y="110" width="144" height="80" rx="12" fill="url(#accent)" opacity="0.15"/>
  <rect x="212" y="125" width="80" height="6" rx="3" fill="#eef0f6" opacity="0.7"/>
  <rect x="212" y="140" width="60" height="4" rx="2" fill="#a78bfa" opacity="0.5"/>
  <rect x="212" y="160" width="100" height="16" rx="8" fill="url(#accent)" opacity="0.6"/>
  <!-- Cards -->
  <rect x="198" y="205" width="144" height="50" rx="8" fill="#1e2140" stroke="#2a2d4a" stroke-width="1"/>
  <rect x="198" y="265" width="144" height="50" rx="8" fill="#1e2140" stroke="#2a2d4a" stroke-width="1"/>
  <rect x="198" y="325" width="144" height="50" rx="8" fill="#1e2140" stroke="#2a2d4a" stroke-width="1"/>
  <!-- Nav bar -->
  <rect x="198" y="395" width="144" height="30" rx="0" fill="#1e2140"/>
  <circle cx="230" cy="410" r="6" fill="url(#accent)" opacity="0.6"/>
  <circle cx="270" cy="410" r="6" fill="#3a3d5a"/>
  <circle cx="310" cy="410" r="6" fill="#3a3d5a"/>
  <!-- Home indicator -->
  <rect x="238" y="425" width="64" height="4" rx="2" fill="#3a3d5a"/>

  <!-- Phone 2 -->
  <rect x="440" y="60" width="180" height="380" rx="24" fill="#151833" stroke="#2a2d4a" stroke-width="2"/>
  <rect x="500" y="72" width="60" height="6" rx="3" fill="#2a2d4a"/>
  <!-- Profile section -->
  <circle cx="530" cy="150" r="30" fill="#1e2140" stroke="url(#accent)" stroke-width="2"/>
  <rect x="490" y="195" width="80" height="6" rx="3" fill="#eef0f6" opacity="0.7"/>
  <rect x="500" y="210" width="60" height="4" rx="2" fill="#5c6078" opacity="0.4"/>
  <!-- Stats row -->
  <rect x="460" y="235" width="45" height="40" rx="8" fill="url(#accent)" opacity="0.1"/>
  <rect x="510" y="235" width="45" height="40" rx="8" fill="url(#accent)" opacity="0.1"/>
  <rect x="560" y="235" width="45" height="40" rx="8" fill="url(#accent)" opacity="0.1"/>
  <!-- Feed items -->
  <rect x="458" y="290" width="144" height="70" rx="10" fill="#1e2140" stroke="#2a2d4a" stroke-width="1"/>
  <rect x="458" y="370" width="144" height="50" rx="10" fill="#1e2140" stroke="#2a2d4a" stroke-width="1"/>
  <!-- Home indicator -->
  <rect x="498" y="425" width="64" height="4" rx="2" fill="#3a3d5a"/>
</svg>
