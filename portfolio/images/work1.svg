<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d35"/>
      <stop offset="100%" style="stop-color:#0d0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6aef"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid of 4 logo concepts -->
  <rect x="80" y="60" width="280" height="220" rx="16" fill="#151833" stroke="#2a2d4a" stroke-width="1"/>
  <rect x="440" y="60" width="280" height="220" rx="16" fill="#151833" stroke="#2a2d4a" stroke-width="1"/>
  <rect x="80" y="320" width="280" height="220" rx="16" fill="#151833" stroke="#2a2d4a" stroke-width="1"/>
  <rect x="440" y="320" width="280" height="220" rx="16" fill="#151833" stroke="#2a2d4a" stroke-width="1"/>
  <!-- Logo 1: Geometric A -->
  <polygon points="220,100 280,220 160,220" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <line x1="190" y1="170" x2="250" y2="170" stroke="#a78bfa" stroke-width="2"/>
  <!-- Logo 2: Infinity -->
  <path d="M540,170 C540,130 590,110 620,140 C650,170 600,210 580,190 C560,170 600,130 620,140" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Logo 3: Abstract M -->
  <path d="M160,470 L200,370 L220,430 L240,370 L280,470" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Logo 4: Diamond -->
  <path d="M580,370 L640,430 L580,490 L520,430 Z" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <circle cx="580" cy="430" r="20" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
</svg>
