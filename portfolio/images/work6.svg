<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d35"/>
      <stop offset="100%" style="stop-color:#0d0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6aef"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#7c6aef"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Poster 1 (left) -->
  <g transform="rotate(-6 230 300)">
    <rect x="60" y="60" width="240" height="360" rx="8" fill="#151833" stroke="#2a2d4a" stroke-width="1"/>
    <!-- Abstract shapes -->
    <circle cx="180" cy="180" r="80" fill="url(#accent)" opacity="0.1"/>
    <circle cx="180" cy="180" r="50" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
    <circle cx="180" cy="180" r="25" fill="url(#accent)" opacity="0.15"/>
    <line x1="80" y1="280" x2="280" y2="280" stroke="#2a2d4a" stroke-width="1"/>
    <rect x="100" y="300" width="160" height="8" rx="4" fill="#eef0f6" opacity="0.6"/>
    <rect x="120" y="320" width="120" height="6" rx="3" fill="#5c6078" opacity="0.3"/>
    <rect x="100" y="350" width="160" height="5" rx="2.5" fill="#5c6078" opacity="0.2"/>
    <rect x="120" y="365" width="120" height="5" rx="2.5" fill="#5c6078" opacity="0.15"/>
  </g>
  <!-- Poster 2 (center) -->
  <rect x="280" y="40" width="240" height="360" rx="8" fill="#151833" stroke="#7c6aef" stroke-width="1.5"/>
  <!-- Geometric composition -->
  <polygon points="400,80 460,200 340,200" fill="url(#accent)" opacity="0.15" stroke="url(#accent)" stroke-width="1.5"/>
  <polygon points="400,120 440,190 360,190" fill="url(#warm)" opacity="0.1"/>
  <rect x="350" y="220" width="100" height="100" rx="4" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.3" transform="rotate(45 400 270)"/>
  <line x1="300" y1="300" x2="500" y2="300" stroke="#2a2d4a" stroke-width="1"/>
  <rect x="320" y="316" width="160" height="8" rx="4" fill="#eef0f6" opacity="0.7"/>
  <rect x="340" y="336" width="120" height="6" rx="3" fill="#a78bfa" opacity="0.4"/>
  <rect x="320" y="360" width="160" height="5" rx="2.5" fill="#5c6078" opacity="0.25"/>
  <!-- Poster 3 (right) -->
  <g transform="rotate(5 580 300)">
    <rect x="500" y="80" width="240" height="360" rx="8" fill="#151833" stroke="#2a2d4a" stroke-width="1"/>
    <!-- Wave pattern -->
    <path d="M520 160 Q580 120 620 180 Q660 240 620 300 Q580 360 540 300 Q500 240 540 180" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
    <path d="M540 170 Q590 140 620 190 Q650 240 620 290 Q590 340 560 290 Q530 240 560 190" fill="url(#accent)" opacity="0.08"/>
    <line x1="520" y1="340" x2="720" y2="340" stroke="#2a2d4a" stroke-width="1"/>
    <rect x="540" y="356" width="160" height="8" rx="4" fill="#eef0f6" opacity="0.6"/>
    <rect x="560" y="376" width="120" height="6" rx="3" fill="#5c6078" opacity="0.3"/>
    <rect x="540" y="400" width="160" height="5" rx="2.5" fill="#5c6078" opacity="0.2"/>
  </g>
  <!-- Shadow/depth -->
  <rect x="60" y="480" width="680" height="60" rx="30" fill="#7c6aef" opacity="0.03" filter="blur(20px)"/>
</svg>
