<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d35"/>
      <stop offset="100%" style="stop-color:#0d0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6aef"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Browser mockup -->
  <rect x="100" y="80" width="600" height="440" rx="12" fill="#151833" stroke="#2a2d4a" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="100" y="80" width="600" height="36" rx="12" fill="#1e2140"/>
  <rect x="100" y="104" width="600" height="12" fill="#1e2140"/>
  <circle cx="124" cy="98" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="142" cy="98" r="5" fill="#eab308" opacity="0.7"/>
  <circle cx="160" cy="98" r="5" fill="#22c55e" opacity="0.7"/>
  <!-- URL bar -->
  <rect x="200" y="90" width="300" height="16" rx="8" fill="#0d0f1e"/>
  <!-- Navigation -->
  <rect x="140" y="136" width="40" height="4" rx="2" fill="url(#accent)"/>
  <rect x="200" y="136" width="50" height="4" rx="2" fill="#3a3d5a"/>
  <rect x="270" y="136" width="45" height="4" rx="2" fill="#3a3d5a"/>
  <rect x="335" y="136" width="55" height="4" rx="2" fill="#3a3d5a"/>
  <rect x="560" y="130" width="100" height="20" rx="10" fill="url(#accent)" opacity="0.8"/>
  <!-- Hero section -->
  <rect x="140" y="180" width="200" height="8" rx="4" fill="#a78bfa" opacity="0.3"/>
  <rect x="140" y="200" width="280" height="18" rx="4" fill="#eef0f6" opacity="0.9"/>
  <rect x="140" y="230" width="240" height="18" rx="4" fill="#a78bfa" opacity="0.6"/>
  <rect x="140" y="264" width="320" height="6" rx="3" fill="#5c6078" opacity="0.4"/>
  <rect x="140" y="278" width="280" height="6" rx="3" fill="#5c6078" opacity="0.3"/>
  <!-- CTA buttons -->
  <rect x="140" y="310" width="110" height="32" rx="16" fill="url(#accent)"/>
  <rect x="266" y="310" width="110" height="32" rx="16" fill="none" stroke="#3a3d5a" stroke-width="1"/>
  <!-- Hero image placeholder -->
  <rect x="500" y="170" width="160" height="200" rx="16" fill="#1e2140" stroke="#2a2d4a" stroke-width="1"/>
  <!-- Cards row -->
  <rect x="140" y="420" width="150" height="80" rx="10" fill="#1e2140" stroke="#2a2d4a" stroke-width="1"/>
  <rect x="310" y="420" width="150" height="80" rx="10" fill="#1e2140" stroke="#2a2d4a" stroke-width="1"/>
  <rect x="480" y="420" width="150" height="80" rx="10" fill="#1e2140" stroke="#2a2d4a" stroke-width="1"/>
</svg>
