<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d35"/>
      <stop offset="100%" style="stop-color:#0d0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6aef"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c6aef"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Post 1 (left, rotated) -->
  <g transform="rotate(-8 220 300)">
    <rect x="60" y="80" width="260" height="320" rx="14" fill="#151833" stroke="#2a2d4a" stroke-width="1"/>
    <rect x="60" y="80" width="260" height="230" rx="14" fill="url(#accent)" opacity="0.12"/>
    <rect x="60" y="296" width="260" height="104" rx="0" fill="#151833"/>
    <circle cx="86" cy="332" r="14" fill="#1e2140" stroke="#3a3d5a" stroke-width="1"/>
    <rect x="108" y="326" width="80" height="5" rx="2.5" fill="#eef0f6" opacity="0.6"/>
    <rect x="108" y="338" width="50" height="4" rx="2" fill="#5c6078" opacity="0.3"/>
    <rect x="78" y="360" width="220" height="4" rx="2" fill="#5c6078" opacity="0.25"/>
    <rect x="78" y="372" width="180" height="4" rx="2" fill="#5c6078" opacity="0.2"/>
    <!-- Abstract design on post -->
    <circle cx="190" cy="200" r="60" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4"/>
    <rect x="150" y="160" width="80" height="80" rx="8" fill="url(#accent)" opacity="0.15" transform="rotate(45 190 200)"/>
  </g>
  <!-- Post 2 (center) -->
  <rect x="270" y="60" width="260" height="340" rx="14" fill="#151833" stroke="#2a2d4a" stroke-width="1.5"/>
  <rect x="270" y="60" width="260" height="240" rx="14" fill="url(#accent2)" opacity="0.15"/>
  <rect x="270" y="286" width="260" height="114" rx="0" fill="#151833"/>
  <circle cx="296" cy="325" r="14" fill="#1e2140" stroke="url(#accent)" stroke-width="1.5"/>
  <rect x="318" y="319" width="90" height="5" rx="2.5" fill="#eef0f6" opacity="0.7"/>
  <rect x="318" y="331" width="55" height="4" rx="2" fill="#a78bfa" opacity="0.4"/>
  <rect x="288" y="358" width="220" height="4" rx="2" fill="#5c6078" opacity="0.25"/>
  <rect x="288" y="370" width="180" height="4" rx="2" fill="#5c6078" opacity="0.2"/>
  <!-- Abstract design -->
  <polygon points="400,110 450,200 350,200" fill="url(#accent)" opacity="0.2"/>
  <circle cx="400" cy="180" r="40" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.5"/>
  <!-- Post 3 (right, rotated) -->
  <g transform="rotate(6 580 300)">
    <rect x="480" y="100" width="260" height="320" rx="14" fill="#151833" stroke="#2a2d4a" stroke-width="1"/>
    <rect x="480" y="100" width="260" height="230" rx="14" fill="url(#accent)" opacity="0.1"/>
    <rect x="480" y="316" width="260" height="104" rx="0" fill="#151833"/>
    <circle cx="506" cy="348" r="14" fill="#1e2140" stroke="#3a3d5a" stroke-width="1"/>
    <rect x="528" y="342" width="80" height="5" rx="2.5" fill="#eef0f6" opacity="0.6"/>
    <rect x="528" y="354" width="50" height="4" rx="2" fill="#5c6078" opacity="0.3"/>
    <rect x="498" y="378" width="220" height="4" rx="2" fill="#5c6078" opacity="0.25"/>
    <!-- Abstract design -->
    <path d="M570 160 Q610 140 650 180 Q690 220 650 260 Q610 300 570 260 Q530 220 570 160" fill="url(#accent)" fill-opacity="0.15" stroke="#7c6aef" stroke-width="1.5" stroke-opacity="0.4"/>
